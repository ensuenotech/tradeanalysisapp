
<nav class="bg-white shadow">
    <div class="mx-auto w-full sm:w-11/12 px-1 sm:px-6 lg:px-8">
      <div class="relative flex h-16 justify-between">
        <div class="absolute inset-y-0 left-0 flex items-center sm:hidden">
          <button
            type="button"
            class="inline-flex items-center justify-center rounded-md p-2 text-gray-400 hover:bg-gray-100 hover:text-gray-500 focus:outline-none focus:ring-2 focus:ring-inset focus:ring-indigo-500"
            aria-controls="mobile-menu"
            (click)="toggleMobileMenu()"
            aria-expanded="false"
          >
            <span class="sr-only">Open main menu</span>
  
            <svg
              class="block h-6 w-6"
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              viewBox="0 0 24 24"
              stroke-width="1.5"
              stroke="currentColor"
              aria-hidden="true"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5"
              />
            </svg>
  
            <svg
              class="hidden h-6 w-6"
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              viewBox="0 0 24 24"
              stroke-width="1.5"
              stroke="currentColor"
              aria-hidden="true"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M6 18L18 6M6 6l12 12"
              />
            </svg>
          </button>
        </div>
        <div
          class="flex flex-1 items-center justify-center sm:items-stretch sm:justify-start"
        >
          <div class="flex flex-shrink-0 items-center">
            <img
              class="block h-8 w-auto lg:hidden"
              src="/assets/images/logo.png"
              alt="straddly.com"
            />
            <img
              class="hidden h-8 w-auto lg:block"
              src="/assets/images/logo.png"
              alt="straddly.com"
            />
          </div>
          
          <div class="hidden sm:ml-6 sm:flex sm:space-x-8" 
          >
            <a
              [routerLink]="['/trade', 'trade-analysis']"
              [ngClass]="
                selectedPath == 'all-positions'
                  ? 'border-indigo-500'
                  : 'text-gray-500 hover:border-gray-300 hover:text-gray-700 border-transparent'
              "
              class="cursor-pointer inline-flex items-center border-b-2 px-1 pt-1 text-sm font-medium"
              >trade-analysis</a
            >
          </div>
          <div class="hidden sm:ml-6 sm:flex sm:space-x-8" 
          >
            <a
              [routerLink]="['/trade', 'uploaders']"
              [ngClass]="
                selectedPath == 'all-positions-normal'
                  ? 'border-indigo-500'
                  : 'text-gray-500 hover:border-gray-300 hover:text-gray-700 border-transparent'
              "
              class="cursor-pointer inline-flex items-center border-b-2 px-1 pt-1 text-sm font-medium"
              >Uploaders</a
            >
          </div>
          
        </div>
        <div
          class="absolute inset-y-0 right-0 flex items-center pr-2 sm:static sm:inset-auto sm:ml-6 sm:pr-0"
        >
          <!-- <button
            type="button"
            class="rounded-full bg-white p-1 text-gray-400 hover:text-gray-500 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2"
          >
            <span class="sr-only">View notifications</span>
            <svg
              class="h-6 w-6"
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              viewBox="0 0 24 24"
              stroke-width="1.5"
              stroke="currentColor"
              aria-hidden="true"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M14.857 17.082a23.848 23.848 0 005.454-1.31A8.967 8.967 0 0118 9.75v-.7V9A6 6 0 006 9v.75a8.967 8.967 0 01-2.312 6.022c1.733.64 3.56 1.085 5.455 1.31m5.714 0a24.255 24.255 0 01-5.714 0m5.714 0a3 3 0 11-5.714 0"
              />
            </svg>
          </button> -->
  
          <div class="relative ml-3">
            <div>
              <button
                (click)="toggleProfileMenu()"
                type="button"
                class="flex bg-white text-sm items-center gap-x-4 px-6 font-semibold leading-6 focus:outline-none "
                id="user-menu-button"
                aria-expanded="false"
                aria-haspopup="true"
              >
                <span class="sr-only">Open user menu</span>
                <div class="cursor-default block text-gray-400">
                  {{datetime | date:'fullTime'}}
                </div>
                <div class="cursor-default block">
                  <div class="text-gray-500">{{user?.firstName}} {{user?.lastName}}</div>
                  <div class="text-xs text-gray-400">UserId: {{user?.id}}</div>
                </div>
                <div
                  class="block h-8 w-8 overflow-hidden rounded-full bg-gray-100"
                >
                  <svg #profileMenu1
                    class="h-full w-full text-gray-300"
                    fill="currentColor"
                    viewBox="0 0 24 24"
                  >
                    <path  #profileMenu2
                      d="M24 20.993V24H0v-2.996A14.977 14.977 0 0112.004 15c4.904 0 9.26 2.354 11.996 5.993zM16.002 8.999a4 4 0 11-8 0 4 4 0 018 0z"
                    />
                  </svg>
                </div>
               
              </button>
            </div>
  
            <div
              [@profileMenu]="profileMenuTrigger" 
              class="transform visible scale-95 absolute right-0 z-10 mt-2 w-48 origin-top-right rounded-md bg-white py-1 shadow-lg ring-1 ring-black ring-opacity-5 focus:outline-none"
              role="menu"
              aria-orientation="vertical"
              aria-labelledby="user-menu-button"
              tabindex="-1"
            >
              <a
                [routerLink]="['/trade', 'dashboard', 'profile']"
              (click)="toggleProfileMenu()"
              class="block px-4 py-2 text-sm text-gray-700"
                role="menuitem"
                tabindex="-1"
                id="user-menu-item-0"
                >Your Profile</a
              >
              <!-- <a
                [routerLink]="['/trade', 'dashboard', 'reports']"
              (click)="toggleProfileMenu()"
              [routerLink]="['/trade', 'dashboard', 'reports']"
                class="block px-4 py-2 text-sm text-gray-700"
                role="menuitem"
                tabindex="-1"
                id="user-menu-item-1"
                >Reports</a
              > -->
              
              <a
                (click)="logout()"
                class="cursor-pointer block px-4 py-2 text-sm text-gray-700"
                role="menuitem"
              (click)="toggleProfileMenu()"
              tabindex="-1"
                id="user-menu-item-2"
                >Sign out</a
              >
            </div>
          </div>
        </div>
      </div>
    </div>
  
    <div class="sm:hidden" [@mobileMenu]="mobileMenuTrigger" *ngIf="showTradeButton()">
      <div class="space-y-1 pt-2 pb-4" (click)="toggleMobileMenu()">
        <a
        [routerLink]="['/', 'trade']"
          [ngClass]="
            selectedPath == 'trade'
              ? 'border-indigo-500 text-indigo-700 bg-indigo-50'
              : 'border-transparent text-gray-500 hover:border-gray-300 hover:bg-gray-50 hover:text-gray-700'
          "
          class="block border-l-4 py-2 pl-3 pr-4 text-base font-medium"
          >Trade</a
        >
      
        <a
          [routerLink]="['/trade', 'all-positions']" 
          
          [ngClass]="
            selectedPath == 'all-positions'
            ? 'border-indigo-500 text-indigo-700 bg-indigo-50'
              : 'border-transparent text-gray-500 hover:border-gray-300 hover:bg-gray-50 hover:text-gray-700'
          "
           class="block border-l-4 py-2 pl-3 pr-4 text-base font-medium"
          >Positions</a
        >
      
        <a
          [routerLink]="['/trade', 'all-positions-symbolwise']" 
          
          [ngClass]="
            selectedPath == 'all-positions-symbolwise'
            ? 'border-indigo-500 text-indigo-700 bg-indigo-50'
              : 'border-transparent text-gray-500 hover:border-gray-300 hover:bg-gray-50 hover:text-gray-700'
          "
           class="block border-l-4 py-2 pl-3 pr-4 text-base font-medium"
          >P.Symbolwise</a
        >
     
        <a
          routerLink="/admin/users" 
          
          [ngClass]="
            selectedPath == 'users'
            ? 'border-indigo-500 text-indigo-700 bg-indigo-50'
              : 'border-transparent text-gray-500 hover:border-gray-300 hover:bg-gray-50 hover:text-gray-700'
          "
           class="block border-l-4 py-2 pl-3 pr-4 text-base font-medium"
          >Users</a
        >
      
        <a
          routerLink="/trade/admin-orders"
          
          [ngClass]="
            selectedPath == 'admin-orders'
            ? 'border-indigo-500 text-indigo-700 bg-indigo-50'
              : 'border-transparent text-gray-500 hover:border-gray-300 hover:bg-gray-50 hover:text-gray-700'
          "
           class="block border-l-4 py-2 pl-3 pr-4 text-base font-medium"
          >Exchange Orders</a
        >
      
        <a
          routerLink="/trade/payouts"
          
          [ngClass]="
            selectedPath == 'payouts'
            ? 'border-indigo-500 text-indigo-700 bg-indigo-50'
              : 'border-transparent text-gray-500 hover:border-gray-300 hover:bg-gray-50 hover:text-gray-700'
          "
           class="block border-l-4 py-2 pl-3 pr-4 text-base font-medium"
          >Payouts</a
        >
      </div>
    </div>
  </nav>
