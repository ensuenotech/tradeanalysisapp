<div class="h-full w-full flex items-center justify-center bg-gray-100 " >
    <div class="w-full max-w-md mx-auto">
      <form [formGroup]="loginForm" (submit)="submit()" class="bg-white p-6 rounded-lg shadow-md">
        <div class="text-center mb-6">
          <h3 class="text-2xl font-semibold">Login</h3>
        </div>
  
        <div class="mb-4">
          <label for="email" class="block text-sm font-medium text-gray-700">Email</label>
          <input id="email" matInput formControlName="email" type="email" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none" />
        </div>
  
        <div class="mb-4">
          <label for="password" class="block text-sm font-medium text-gray-700">Password</label>
          <input id="password" matInput formControlName="password" type="password" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none" />
        </div>
  
        <div class="mb-4 text-center">
          <button type="submit" class="w-full py-3 bg-indigo-500 text-white font-bold rounded-lg hover:bg-indigo-600 focus:outline-none">Login</button>
        </div>
  
        
      </form>
    </div>
  </div>
